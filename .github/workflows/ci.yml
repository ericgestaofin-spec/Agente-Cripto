name: CI

# Ordem deliberada: falha rápido no barato. Um float em caminho de dinheiro
# é pego em segundos, antes de subir Postgres ou rodar mutation testing.

on:
  push:
    branches: [main]
  pull_request:

env:
  PYTHONPATH: src

jobs:
  quality:
    name: Qualidade estática
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"

      - name: ruff (lint)
        run: ruff check .

      - name: ruff (format)
        run: ruff format --check .

      - name: mypy --strict
        run: mypy

      - name: no-float (gate bloqueante)
        run: python -m tools.lint.no_float

  tests:
    name: Testes
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bybit_agent_test
          POSTGRES_USER: agent
          POSTGRES_PASSWORD: test
        ports: ["5433:5432"]
        options: >-
          --health-cmd "pg_isready -U agent -d bybit_agent_test"
          --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"

      - name: unit (< 10s)
        run: pytest tests/unit --timeout=30

      - name: property (hypothesis)
        run: pytest tests/property
        if: hashFiles('tests/property/**/*.py') != ''

      - name: contract
        run: pytest tests/contract
        if: hashFiles('tests/contract/**/*.py') != ''

      - name: integration
        run: pytest tests/integration
        if: hashFiles('tests/integration/**/*.py') != ''
        env:
          TEST_DATABASE_URL: postgresql://agent:test@localhost:5433/bybit_agent_test

      - name: chaos
        run: pytest tests/chaos
        if: hashFiles('tests/chaos/**/*.py') != ''

  risk-engine-gates:
    name: Gates do Risk Engine
    runs-on: ubuntu-latest
    needs: tests
    # O motor de risco é o componente onde o dinheiro vive. Cobertura de
    # branch 100% e mutation score >= 90% não são metas — são gates.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"

      - name: Cobertura de branch (risk/, execution/)
        run: |
          if [ -n "$(find src/bybit_agent/risk -name '*.py' -not -name '__init__.py' 2>/dev/null)" ]; then
            pytest tests/unit tests/property \
              --cov=src/bybit_agent/risk \
              --cov=src/bybit_agent/execution \
              --cov-branch --cov-fail-under=95
          else
            echo "risk/ ainda vazio — gate ativa no Sprint 4"
          fi

      - name: Mutation testing (risk/)
        run: |
          if [ -n "$(find src/bybit_agent/risk -name '*.py' -not -name '__init__.py' 2>/dev/null)" ]; then
            mutmut run --paths-to-mutate src/bybit_agent/risk/ || true
            mutmut results
          else
            echo "risk/ ainda vazio — gate ativa no Sprint 4"
          fi
